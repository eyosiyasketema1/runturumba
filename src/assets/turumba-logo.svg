<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- Blue circle background -->
  <circle cx="120" cy="120" r="120" fill="#2563EB"/>
  <!-- Megaphone / horn shape in white -->
  <g transform="translate(120,120) rotate(-30)">
    <!-- Horn body - expanding cone -->
    <path d="M-15,-8 L45,-35 Q55,-38 55,-28 L55,28 Q55,38 45,35 L-15,8 Z" fill="white"/>
    <!-- Mouthpiece -->
    <rect x="-25" y="-10" width="12" height="20" rx="3" fill="white"/>
    <!-- Sound waves -->
    <path d="M60,-20 Q75,-10 60,0" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M60,0 Q75,10 60,20" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M72,-30 Q92,-15 72,0" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M72,0 Q92,15 72,30" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
